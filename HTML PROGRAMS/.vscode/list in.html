<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list in HTML</title>
</head>
<style>
    h3 {
        background-color: blue;
    }
    
    li {
        list-style-type: square;
        text-align: left;
    }
    
    li {
        background-color: orange;
    }
</style>

<body>
    <h3>
        <u> <p>list of fruits:</p></u>
    </h3>
    <ul>
        <li>apple</li>
        <li>mango</li>
        <li>graphes</li>
    </ul>
    <br>
    <h3><u><p>list of cars:</p></u></h3>
    <ol>
        <li>bmw</li>
        <li>audi q7</li>
        <li>honda city</li>
    </ol>
</body>

</html>
