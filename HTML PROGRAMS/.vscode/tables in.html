<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
</head>
<style>
    table {
        border: 2px solid black;
    }
    
    tr {
        background-color: red;
    }
    
    td {
        background-color: blue;
    }
</style>

<body>
    <table>
        <colspan="2">
            <caption><u>Student data</u></caption>
            </colspan>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                </th>
            </tr>
            <td>Eshu</td>
            <td>2100</td>
            </tr>
            <tr>
                <td>Rohit</td>
                <td>2101</td>
            </tr>
            <tr>
                <td>Shivam</td>
                <td>2102</td>
            </tr>
    </table>
</body>

</html>
