<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if else program</title>
</head>

<body>
    <script>
        var time = prompt("Hey whats the time:");
        if (time > 5 && time < 17) {
            alert("Good morning");
        } else {
            alert("Good evening");
        }
    </script>
</body>

</html>
