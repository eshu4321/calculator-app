<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuction in javascript</title>
</head>

<body>
    <script>
        // sandwich is ready using fuction
        let bread1 = prompt("which bread would you like to:-");
        let veggies1 = prompt("what are your favourite veggies:-");
        let sauce1 = prompt("which sauce would you like to:-");

        function MakeSandwich(bread, veggies, sauce) {
            let sandwich = bread + "bread" + veggies + " " + sauce + "sandwich is ready";
            return sandwich;
        }
        let vegsandwich = MakeSandwich(bread1, veggies1, sauce1);
        console.log(vegsandwich);
    </script>
</body>

</html>
