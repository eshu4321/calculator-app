<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixing capitalization</title>
</head>

<body>
    <h2>fixng capitalization</h2>
    <div class="output">
        <ul>

        </ul>
    </div>
    <script>
        const list = document.querySelector('.output ul');
        list.innerHTML = '';
        let cities = ['mumBai',
            'DElhi', 'JaipuR', 'gOa'
        ];
        for (let i = 0; i < cities.length; i++) {
            let lowerCaseCity = cities[i].toLowerCase();
            let FirstAlphabet = lowerCaseCity.slice(0, 1);
            lowerCaseCity = lowerCaseCity.replace(FirstAlphabet, FirstAlphabet.toUpperCase());
            let listItem = document.createElement('li');
            listItem.textContent = lowerCaseCity;
            list.appendChild(listItem);
        }
    </script>

</body>

</html>
