<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch case</title>
</head>

<body>
    <h1> today we dicuss price the of fruits</h1>
    <script>
        var fruittype = prompt("konsa fal chaiye?");
        switch (fruittype) {
            case 'Narangi':
                console.log("Narangi price is 80rs kg");
                break;
            case 'Apple':
                console.log("apple price is 60rs kg");
                break;
            case 'Orange':
                console.log("Orange price is 70rs kg");
                break;
            case 'Mango':
                console.log("Mango price is 50rs kg");
                break;
            default:
                Console.log("Invalid case");
        }
    </script>
</body>

</html>
